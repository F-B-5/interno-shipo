<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Motion Classifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #2a2a2a; color: #fff; font-family: 'Press Start 2P', cursive; text-align: center; }
        .crafting-table { border: 8px solid #8b4513; background-color: #555; padding: 20px; margin: 20px auto; width: 80%; border-radius: 4px; }
        .slot { border: 4px solid #333; background: #444; margin: 10px; padding: 15px; display: inline-block; }
        .redstone-lamp { height: 50px; width: 50px; background: #660000; border: 4px solid #333; margin: 10px auto; transition: background 0.3s; }
        .lamp-on { background: #ff0000; box-shadow: 0 0 20px #ff0000; }
        canvas { background: #000; border: 4px solid #fff; margin-top: 20px; }
        button { background: #228b22; color: white; border: 4px solid #006400; padding: 15px; font-family: inherit; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Gesture Crafting</h1>
    <button id="startBtn">START SENSORS</button>
    <div id="status" class="slot">Status: Idle</div>
    
    <canvas id="waveform" width="400" height="200"></canvas>

    <div class="crafting-table">
        <div class="slot">Up-Down: <span id="prob-updown">0%</span></div>
        <div class="slot">Left-Right: <span id="prob-leftright">0%</span></div>
    </div>

    <div id="lamp" class="redstone-lamp"></div>

    <script src="edge-impulse-standalone.js"></script>
    <script>
<script>
    // Function to handle the sensor request
    async function requestSensorAccess() {
        // 1. Check for iOS 13+ permission requirements
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission === 'granted') {
                    startDataStream();
                } else {
                    alert("Permission denied. Motion sensors are required.");
                }
            } catch (error) {
                console.error("Permission error:", error);
            }
        } else {
            // 2. Android/Desktop: No formal request needed, just start
            startDataStream();
        }
    }

    // 3. The actual telemetry stream
    function startDataStream() {
        window.addEventListener('devicemotion', (event) => {
            const acc = event.accelerationIncludingGravity;
            if (acc) {
                // Update UI
                document.getElementById("status").innerText = "Status: Sensor Online";
                // FEED TO WASM: This is where you pass data to your classifier
                // Example: window.classify(acc.x, acc.y, acc.z);
                console.log("Motion Data:", acc.x, acc.y, acc.z);
            }
        });
    }

    // Attach to your button
    document.getElementById("startBtn").addEventListener("click", requestSensorAccess);
</script>
    </script>
</body>
</html>
