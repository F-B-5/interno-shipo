<script>
    let classifier;

    async function init() {
        try {
            classifier = new EdgeImpulseClassifier();
            await classifier.init();
            console.log("Classifier Ready");
        } catch(e) { console.error("Init failed", e); }
    }

    async function requestAccess() {
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            const p = await DeviceMotionEvent.requestPermission();
            if (p !== 'granted') return alert("Permission Denied");
        }
        startPipeline();
    }

    function startPipeline() {
        document.getElementById("status").innerText = "Status: Online";
        const wave = document.getElementById("wave-indicator");
        if (wave) {
            wave.style.animation = "moveWave 1s linear infinite";
        }

        window.addEventListener('devicemotion', (e) => {
            const acc = e.accelerationIncludingGravity;
            if (!acc) return;

            // Run inference
            const res = classifier.classify([acc.x, acc.y, acc.z]);
            
            // Ensure labels here match your Edge Impulse project EXACTLY
            const up = res.results.find(r => r.label === 'Up-Down').value;
            const left = res.results.find(r => r.label === 'Left-Right').value;

            document.getElementById("bar-up").style.width = (up * 100) + "%";
            document.getElementById("text-up").innerText = (up * 100).toFixed(0) + "%";
            
            document.getElementById("bar-left").style.width = (left * 100) + "%";
            document.getElementById("text-left").innerText = (left * 100).toFixed(0) + "%";
        });
    }

    document.getElementById("startBtn").addEventListener("click", requestAccess);
    init();
</script>
