<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Telemetry Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Press Start 2P', cursive; padding: 20px; }
        .dashboard { border: 4px solid #333; background: #111; padding: 20px; max-width: 600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .btn { background: #004d00; color: white; padding: 15px; width: 100%; border: 4px solid #002600; cursor: pointer; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .card { background: #1a1a1a; padding: 15px; border: 2px solid #333; text-align: center; font-size: 0.7em; }
        .prob-bar { background: #222; height: 20px; margin: 10px 0; border: 2px solid #444; position: relative; }
        .prob-fill { background: #00ff00; height: 100%; width: 0%; transition: width 0.2s; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h2>AERO MINECRAFT</h2>
            <div id="status">● Sensor Offline</div>
        </div>
        <button id="startBtn" class="btn">ACTIVATE SENSORS</button>

        <div class="grid">
            <div class="card">X: <span id="val-x">0.0</span></div>
            <div class="card">Y: <span id="val-y">0.0</span></div>
            <div class="card">Z: <span id="val-z">0.0</span></div>
        </div>

        <h3>MODEL PROBABILITY</h3>
        <div>Up-Down: <div class="prob-bar"><div id="bar-up" class="prob-fill"></div></div></div>
        <div>Left-Right: <div class="prob-bar"><div id="bar-left" class="prob-fill"></div></div></div>
    </div>

    <script src="edge-impulse-standalone.js"></script>
    <script>
        let classifier;

        async function init() {
            // Adjust this path if your model is in a subfolder
            classifier = new EdgeImpulseClassifier();
            await classifier.init();
        }

        async function requestSensorAccess() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const p = await DeviceMotionEvent.requestPermission();
                if (p === 'granted') start();
            } else { start(); }
        }

        function start() {
            document.getElementById("status").innerText = "● Sensor Online";
            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity;
                document.getElementById("val-x").innerText = acc.x.toFixed(1);
                document.getElementById("val-y").innerText = acc.y.toFixed(1);
                document.getElementById("val-z").innerText = acc.z.toFixed(1);

                // Run inference
                const result = classifier.classify([acc.x, acc.y, acc.z]);
                const upDown = result.results.find(r => r.label === 'Up-Down').value;
                const leftRight = result.results.find(r => r.label === 'Left-Right').value;
                
                document.getElementById("bar-up").style.width = (upDown * 100) + "%";
                document.getElementById("bar-left").style.width = (leftRight * 100) + "%";
            });
        }

        document.getElementById("startBtn").addEventListener("click", requestSensorAccess);
        init();
    </script>
</body>
</html>
