<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Gesture Crafting</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: 'Press Start 2P', cursive; padding: 20px; }
        .dashboard { border: 4px solid #444; background: #222; padding: 20px; max-width: 500px; margin: auto; }
        .status-box { background: #000; padding: 10px; border: 2px solid #555; text-align: center; margin: 10px 0; }
        .btn { background: #2a5a2a; color: white; padding: 15px; width: 100%; border: 4px solid #1a3a1a; cursor: pointer; font-size: 14px; }
        .card { background: #333; padding: 15px; border: 2px solid #444; margin: 5px; }
        .bar-container { background: #000; height: 20px; margin-top: 5px; border: 1px solid #444; }
        .bar-fill { background: #00ff00; height: 100%; width: 0%; transition: width 0.1s; }
        
        .waveform-container { height: 20px; width: 100%; background: #000; margin-top: 5px; overflow: hidden; position: relative; }
        .wave { height: 100%; width: 5px; background: #00ff00; position: absolute; left: -10px; }
        @keyframes moveWave { from { left: -10px; } to { left: 100%; } }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>Gesture Crafting</h1>
    <div id="status" class="status-box">Status: Offline</div>
    <div class="waveform-container">
        <div id="wave-indicator" class="wave"></div>
    </div>
    
    <button id="startBtn" class="btn">START SENSORS</button>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="card">X-Axis<br><span id="val-x">0.0</span></div>
        <div class="card">Y-Axis<br><span id="val-y">0.0</span></div>
    </div>

    <div class="card">
        <div>Up-Down</div>
        <div class="bar-container"><div id="bar-up" class="bar-fill"></div></div>
        <div id="text-up">0%</div>
    </div>
    
    <div class="card">
        <div>Left-Right</div>
        <div class="bar-container"><div id="bar-left" class="bar-fill"></div></div>
        <div id="text-left">0%</div>
    </div>
</div>

<script src="edge-impulse-standalone.js"></script>
<script>
    let classifier;

    async function init() {
        try {
            classifier = new EdgeImpulseClassifier();
            await classifier.init();
            console.log("Classifier Ready");
        } catch(e) { console.error("Init failed", e); }
    }

    async function requestAccess() {
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            const p = await DeviceMotionEvent.requestPermission();
            if (p !== 'granted') return alert("Permission Denied");
        }
        startPipeline();
    }

    function startPipeline() {
        document.getElementById("status").innerText = "Status: Online (Active)";
        const wave = document.getElementById("wave-indicator");
        if (wave) wave.style.animation = "moveWave 1s linear infinite";

        window.addEventListener('devicemotion', (e) => {
            let acc = e.acceleration; 
            if (!acc || (acc.x === null)) {
                acc = e.accelerationIncludingGravity;
            }
            if (!acc) return;

            // 1. Update Telemetry
            document.getElementById("val-x").innerText = acc.x ? acc.x.toFixed(2) : "0.00";
            document.getElementById("val-y").innerText = acc.y ? acc.y.toFixed(2) : "0.00";

            // 2. Inference
            const res = classifier.classify([acc.x, acc.y, acc.z]);
            
            // 3. Update Bars (Ensure labels match your Edge Impulse project!)
            const up = res.results.find(r => r.label === 'Up-Down').value;
            const left = res.results.find(r => r.label === 'Left-Right').value;

            document.getElementById("bar-up").style.width = (up * 100) + "%";
            document.getElementById("text-up").innerText = (up * 100).toFixed(0) + "%";
            document.getElementById("bar-left").style.width = (left * 100) + "%";
            document.getElementById("text-left").innerText = (left * 100).toFixed(0) + "%";
        });
    }

    document.getElementById("startBtn").addEventListener("click", requestAccess);
    init();
</script>
</body>
</html>
