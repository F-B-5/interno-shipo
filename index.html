<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Telemetry Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: #00ff00; font-family: 'Press Start 2P', cursive; padding: 20px; }
        .dashboard { border: 4px solid #444; background: #222; padding: 20px; max-width: 500px; margin: auto; }
        .sensor-status { background: #333; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 20px; border: 2px solid #555; }
        .btn { background: #2a5a2a; color: white; padding: 15px; width: 100%; border: 4px solid #1a3a1a; cursor: pointer; font-family: inherit; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { background: #333; padding: 15px; border: 2px solid #444; text-align: center; }
        .val { font-size: 1.2em; display: block; margin-top: 10px; color: #fff; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>AERO MINECRAFT</h1>
        <div id="status" class="sensor-status">Sensor Offline</div>
        <button id="startBtn" class="btn">ACTIVATE SENSORS</button>
        
        <div class="grid">
            <div class="card">X-AXIS<span id="x-val" class="val">0.0</span></div>
            <div class="card">Y-AXIS<span id="y-val" class="val">0.0</span></div>
        </div>
    </div>

   <script>
    // Telemetry state
    let isStreaming = false;

    async function requestSensorAccess() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            const permission = await DeviceMotionEvent.requestPermission();
            if (permission === 'granted') startTelemetry();
        } else { startTelemetry(); }
    }

    function startTelemetry() {
        if (isStreaming) return;
        isStreaming = true;
        document.getElementById("status").innerText = "Status: Sensor Online";

        window.addEventListener('devicemotion', (event) => {
            const acc = event.accelerationIncludingGravity;
            if (acc) {
                // Update your "Axis" values in real-time
                document.getElementById("x-val").innerText = acc.x.toFixed(3);
                document.getElementById("y-val").innerText = acc.y.toFixed(3);
                
                // HERE: Add the buffer logic to feed your WASM classifier
                // The AERO app likely uses a circular buffer to hold 
                // X, Y, Z values before sending them to the model
            }
        });
    }

    document.getElementById("startBtn").addEventListener("click", requestSensorAccess);
</script>
</body>
</html>
